services:
  n8n:
    container_name: n8n
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_PROXY_HOPS=1
      - N8N_HOST=n8n.andresholivin.dev
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://n8n.andresholivin.dev
      - WEBHOOK_URL=https://n8n.andresholivin.dev
      - N8N_DIAGNOSTICS_ENABLED=false
    ports:
      - '5678:5678'
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
