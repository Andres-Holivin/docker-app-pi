#####################################################################
# --- MCU (Micro-controller Unit) & CONNECTION ---
#####################################################################

[mcu]
# serial: The address of your Mega2560 on the Pi's USB bus.
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0

[printer]
# kinematics: The mechanical arrangement. 'cartesian' = standard X,Y,Z axes.
kinematics: cartesian
# max_velocity: The speed limit for XY moves (mm/s).
max_velocity: 300
# max_accel: How fast the printer reaches top speed (mm/s²). Higher = sharper corners.
max_accel: 1500
# max_z_velocity: Speed limit for vertical Z moves.
max_z_velocity: 10
# max_z_accel: Acceleration limit for vertical Z moves.
max_z_accel: 100
# square_corner_velocity: Max toolhead speed through 90° corners (mm/s). Raising
# this reduces print time but can cause ringing. 5.0 is the Klipper default.
square_corner_velocity: 5.0

#####################################################################
# --- STEPPER MOTOR SETTINGS ---
#####################################################################

[stepper_x]
# step_pin: The pin that sends the "move" pulse to the motor driver.
step_pin: PF0
# dir_pin: Sets the direction of rotation. Add '!' to reverse it.
dir_pin: PF1
# enable_pin: Power on/off for the motor. '!' means active when signal is low.
enable_pin: !PD7
# microsteps: Steps per full rotation divided by your driver jumpers (usually 16).
microsteps: 16
# rotation_distance: Distance (mm) traveled in one full motor revolution.
rotation_distance: 32
# endstop_pin: The pin for the X limit switch. '^' is the internal pull-up resistor.
endstop_pin: ^!PE5
# homing_speed: How fast the axis travels while looking for the endstop.
homing_speed: 50
# position_endstop: The coordinate assigned when the nozzle hits the switch.
position_endstop: -25   # X home switch is at X=-40, so bed/front-left is X=0
position_min: -25       # The lowest coordinate the printer is allowed to go
# position_max: The absolute furthest the X-axis can travel (mm).
position_max: 200       # The highest coordinate (size of your bed)


[stepper_y]
step_pin: PF6
dir_pin: !PF7
enable_pin: !PF2
microsteps: 16
rotation_distance: 32
endstop_pin: ^!PJ1
position_endstop: 0
position_min: 0
position_max: 110
homing_speed: 50

[stepper_z]
step_pin: PL3
dir_pin: PL1
enable_pin: !PK0
microsteps: 16
# rotation_distance: 8mm is standard for T8 Lead Screws.
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -15
position_max: 165
homing_speed: 4
homing_retract_dist: 0

[servo z_probe_servo]
# RAMPS D11 (ATmega2560 PB5)
pin: PH3
maximum_servo_angle:200
minimum_pulse_width: 0.0005
maximum_pulse_width: 0.0025
initial_angle: 180

[probe]
# Probe signal uses old Z-min endstop input
pin: ^!PD3
x_offset: 60
y_offset: 30
z_offset :  9.475
# Keep the probe deployed during multi-sample probing to avoid servo jitter.
deactivate_on_each_sample: False
speed: 3
lift_speed: 10
samples: 3
sample_retract_dist: 3
samples_result: median
# Keep the default tolerance, but allow extra retries for multi-point mesh runs.
samples_tolerance: 0.05
samples_tolerance_retries: 10
activate_gcode:
    SET_SERVO SERVO=z_probe_servo ANGLE=60
    G4 P1000
deactivate_gcode:
    SET_SERVO SERVO=z_probe_servo ANGLE=180
    G4 P300

[safe_z_home]
# Home Z at the same bed point used for probe calibration and zero reference.
# With probe offsets X -50, Y -40, X160 Y95 places the probe at X110 Y55.
home_xy_position: 50,50
speed: 80
z_hop: 15
z_hop_speed: 5

[bed_mesh]
speed: 100
horizontal_move_z: 15
# bed_mesh coordinates are relative to the probe, not the nozzle.
# With probe offsets X -50, Y -40 and nozzle travel X -40..200 / Y 0..113,
# keep extra Z clearance before probing and cap the mesh below the probe's
# right/rear reach so the probe stays on the bed with a small safety margin.
mesh_min: 35,30
mesh_max: 190,110
probe_count: 3, 3
algorithm: bicubic
# Keep zero adjustment at the same point used for Z homing / probe calibration.
zero_reference_position:  50,50
fade_start: 1.0
fade_end: 10.0
fade_target: 0

#####################################################################
# --- EXTRUDER (ON RAMPS E1 SLOT) ---
#####################################################################

[extruder]
# Pins for the second extruder slot (E1) on RAMPS.
step_pin: PC1
dir_pin: PC3
enable_pin: !PC7
microsteps: 16
# rotation_distance: Distance of filament pushed per turn. Calibrate this for accuracy.
rotation_distance: 33.500
# nozzle_diameter: The exit hole of your brass nozzle.
nozzle_diameter: 0.400
# filament_diameter: Standard size for PLA/ABS/PETG.
filament_diameter: 1.750
# heater_pin: D10 terminal on RAMPS where your heater cartridge is wired.
heater_pin: PB4
# sensor_type: The model of your thermistor sensor.
sensor_type: EPCOS 100K B57560G104F
# sensor_pin: The T0 port on RAMPS (PK5 hardware pin).
sensor_pin: PK5
# PID Tuning: These 3 constants control how stable your temperature is.
#control: pid
#pid_Kp: 21.203
#pid_Ki: 0.827
#pid_Kd: 135.962
# min_temp: The floor temperature. Below this, the printer shuts down for safety.
min_temp: -273.15
# max_temp: The ceiling temperature. Above this, the printer shuts down.
max_temp: 250
max_extrude_cross_section: 2.0
# Allow long extrude-only moves needed for LOAD/UNLOAD filament operations.
max_extrude_only_distance: 200
# Pressure advance reduces ooze and corner blobs. Calibrate with the
# pa_pattern gcodes in /gcodes/. Typical PLA range: 0.04–0.12.
# Set to 0.0 to disable until calibrated.
pressure_advance: 0.0
pressure_advance_smooth_time: 0.040

[verify_heater extruder]
max_error: 120
check_gain_time: 30
hysteresis: 5
heating_gain: 2

#####################################################################
# --- HEATED BED ---
#####################################################################

[heater_bed]
# heater_pin: D8 terminal on RAMPS for the bed heater.
heater_pin: PH5
sensor_type: EPCOS 100K B57560G104F
# sensor_pin: T1 port on RAMPS (PK6 hardware pin).
sensor_pin: PK6
# watermark: Simple on/off logic for the bed temperature.
#control: pid
#pid_Kp: 61.343
#pid_Ki: 1.043
#pid_Kd: 901.743
min_temp: 5
max_temp: 130

#####################################################################
# --- FANS & PERIPHERALS ---
#####################################################################

[fan]
# pin: D9 terminal on RAMPS, used for cooling the printed plastic.
pin: PH6

[display]
# lcd_type: For the classic 4-line blue text display.
lcd_type: hd44780
# Pins required for the Smart Controller adapter on RAMPS.
rs_pin: PH1
e_pin: PH0
d4_pin: PA1
d5_pin: PA3
d6_pin: PA5
d7_pin: PA7
encoder_pins: ^PC6, ^PC4
click_pin: ^!PC2

[output_pin beeper]
# pin: The buzzer on your LCD board.
pin: PC0

#####################################################################
# --- INTERNAL MODULES & MACROS ---
#####################################################################

[virtual_sdcard]
# path: The location on your Pi 4 where G-codes are uploaded.
path: /opt/printer_data/gcodes

[pause_resume]
# Enables the ability to pause a print.
recover_velocity: 50

[exclude_object]
# Enables EXCLUDE_OBJECT_* commands emitted by the slicer/Moonraker.

[display_status]
# Allows G-code to send messages and progress to the screen.

[respond]
# Enables RESPOND / M118 G-code commands from macros.

[idle_timeout]
# Turn off heaters and steppers after 30 min of inactivity (safety: prevents
# leaving the printer hot when unattended or after a failed/finished print).
gcode:
    TURN_OFF_HEATERS
    M84
timeout: 1800

[firmware_retraction]
# Global retraction via G10 (retract) / G11 (unretract).
# To use this: enable "Use firmware retraction" in OrcaSlicer process settings.
# These values mirror the manual retraction settings in the slicer profile.
retract_length: 2.0
retract_speed: 35
unretract_extra_length: 0
unretract_speed: 35

[gcode_macro CALIBRATE_Z_OFFSET]
# Move to a probe-safe location before starting PROBE_CALIBRATE.
# Current probe offsets are X -50, Y -40. X160 Y95 places the probe at
# X110 Y55, matching safe_z_home and the bed_mesh zero reference point.
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
    {% endif %}
    {% set z_max = printer.toolhead.axis_maximum.z|float %}
    {% set z_current = printer.toolhead.position.z|float %}
    {% set z_safe = 10.0 if z_current < (z_max - 10.0) else (z_max - z_current) %}
    G91
    G1 Z{z_safe} F600
    G90
    G1 X160 Y95 F6000
    PROBE_CALIBRATE

#####################################################################
# --- PRINT MANAGEMENT MACROS ---
#####################################################################

[gcode_macro START_PRINT]
# Slicer start G-code: START_PRINT BED_TEMP={first_layer_bed_temperature[0]} EXTRUDER_TEMP={first_layer_temperature[0]}
# This replaces all the inline start G-code in OrcaSlicer if preferred.
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    M140 S{BED_TEMP}                    ; Start bed heating (no wait)
    M104 S{EXTRUDER_TEMP}               ; Start hotend heating (no wait)
    G90                                  ; Absolute positioning
    G28                                  ; Home all axes
    BED_MESH_PROFILE LOAD=default        ; Load saved bed mesh
    M190 S{BED_TEMP}                    ; Wait for bed temp
    M109 S{EXTRUDER_TEMP}               ; Wait for hotend temp
    G92 E0
    G1 Z2.0 F3000
    G1 X5 Y20 F6000
    G1 Z0.28 F1200
    G1 X5 Y95 E12 F1200
    G1 X5.6 Y95 F6000
    G1 X5.6 Y20 E24 F1200
    G92 E0

[gcode_macro PARK_FRONT_LEFT]
# Home if needed, then move the nozzle to X0 Y0.
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
    {% endif %}
    G90
    G1 X0 Y0 F6000

[gcode_macro END_PRINT]
# Slicer end G-code: END_PRINT
gcode:
    M400                                 ; Wait for all moves to finish
    G92 E0
    G1 E-1.0 F1800                      ; Retract
    G91
    G1 Z20 F600                         ; Lift nozzle
    G90
    PARK_FRONT_LEFT
    TURN_OFF_HEATERS
    M107                                 ; Fan off

[gcode_macro M600]
# Filament change — triggered by slicer M600 or from Mainsail manually.
# Calls PAUSE which handles safe park with retract and Z lift.
gcode:
    PAUSE

[gcode_macro LOAD_FILAMENT]
# Usage via Mainsail console: LOAD_FILAMENT [TEMP=200]
# Heats to TEMP, then pushes filament through bowden tube and into nozzle.
gcode:
    {% set TEMP = params.TEMP|default(200)|float %}
    M109 S{TEMP}                         ; Heat to temperature
    M83                                  ; Relative extrusion
    G1 E50 F300                          ; Fast load through bowden
    G1 E30 F150                          ; Slower push into hotend
    G1 E20 F100                          ; Slow purge
    G92 E0

[gcode_macro UNLOAD_FILAMENT]
# Usage via Mainsail console: UNLOAD_FILAMENT [TEMP=200]
# Heats to TEMP, purges briefly, then rapidly pulls filament back.
gcode:
    {% set TEMP = params.TEMP|default(200)|float %}
    M109 S{TEMP}                         ; Heat to temperature
    M83                                  ; Relative extrusion
    G1 E5 F300                           ; Short purge to soften tip
    G1 E-80 F600                         ; Fast retract out of bowden
    G92 E0

[gcode_macro PAUSE]
# Custom logic for what happens when you press 'Pause'.
rename_existing: PAUSE_BASE
gcode:
    {% set x_park = printer.toolhead.axis_maximum.x|float - 5.0 %}
    {% set y_park = printer.toolhead.axis_maximum.y|float - 5.0 %}
    {% set z_max = printer.toolhead.axis_maximum.z|float %}
    {% set z_current = printer.toolhead.position.z|float %}
    {% set z_safe = 10.0 if z_current < (z_max - 10.0) else (z_max - z_current) %}
    PAUSE_BASE
    SAVE_GCODE_STATE NAME=PAUSE_state
    {% if printer.extruder.can_extrude %}
    M83
    G1 E-1.0 F1800
    {% else %}
    {action_respond_info("Extruder not hot enough for PAUSE retract")}
    {% endif %}
    {% if "xyz" in printer.toolhead.homed_axes %}
    G91
    G1 Z{z_safe} F600
    G90
    G1 X{x_park} Y{y_park} F6000
    {% else %}
    {action_respond_info("Printer not homed; skipping PAUSE park move")}
    {% endif %}
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=0

[gcode_macro RESUME]
# Custom logic for resuming after a pause.
rename_existing: RESUME_BASE
gcode:
    SAVE_GCODE_STATE NAME=RESUME_state
    {% if printer.extruder.can_extrude %}
    M83
    G1 E1.0 F1800
    {% else %}
    {action_respond_info("Extruder not hot enough for RESUME prime")}
    {% endif %}
    RESTORE_GCODE_STATE NAME=RESUME_state MOVE=0
    RESUME_BASE

[gcode_macro CANCEL_PRINT]
# Custom logic for stopping a print safely.
rename_existing: CANCEL_PRINT_BASE
gcode:
    {% set x_park = printer.toolhead.axis_maximum.x|float - 5.0 %}
    {% set y_park = printer.toolhead.axis_maximum.y|float - 5.0 %}
    {% set z_max = printer.toolhead.axis_maximum.z|float %}
    {% set z_current = printer.toolhead.position.z|float %}
    {% set z_safe = 10.0 if z_current < (z_max - 10.0) else (z_max - z_current) %}
    TURN_OFF_HEATERS
    M107
    SAVE_GCODE_STATE NAME=CANCEL_PRINT_state
    {% if printer.extruder.can_extrude %}
    M83
    G1 E-1.0 F1800
    {% endif %}
    {% if "xyz" in printer.toolhead.homed_axes %}
    G91
    G1 Z{z_safe} F600
    G90
    G1 X{x_park} Y{y_park} F6000
    {% endif %}
    RESTORE_GCODE_STATE NAME=CANCEL_PRINT_state MOVE=0
    CLEAR_PAUSE
    CANCEL_PRINT_BASE
    PARK_FRONT_LEFT

